name: CI-CD Pipeline
on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Stage 1 Clone Repository
        uses: actions/checkout@v3

      - name: Stage 2 Install Dependencies
        run: pip install -r requirements.txt

      - name: Stage 3 Docker Build and Push
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
          docker build -t ${{ secrets.DOCKER_USERNAME }}/multi-agent-ai:latest .
          docker push ${{ secrets.DOCKER_USERNAME }}/multi-agent-ai:latest