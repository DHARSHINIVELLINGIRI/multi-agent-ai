name: CI-CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Stage 1 - Clone Code
        uses: actions/checkout@v3

      - name: Stage 2 - Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Stage 3 - Docker Build and Push
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
          docker build -t ${{ secrets.DOCKER_USERNAME }}/multi-agent-ai:latest .
          docker push ${{ secrets.DOCKER_USERNAME }}/multi-agent-ai:latest

      - name: Stage 4 - Deploy to EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Ubuntu commands to ensure Docker is ready
            sudo apt-get update -y
            sudo apt-get install docker.io -y || true
            sudo systemctl start docker || true
            sudo chmod 666 /var/run/docker.sock || true
            
            # Login to Docker on EC2 to avoid pull limits
            echo "${{ secrets.DOCKER_PASSWORD }}" | sudo docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

            # Pull and Restart the app
            sudo docker pull ${{ secrets.DOCKER_USERNAME }}/multi-agent-ai:latest
            sudo docker stop ai-app || true
            sudo docker rm ai-app || true
            sudo docker run -d --name ai-app -p 8000:8000 \
            -e GEMINI_API_KEY="${{ secrets.GEMINI_API_KEY }}" \
            ${{ secrets.DOCKER_USERNAME }}/multi-agent-ai:latest