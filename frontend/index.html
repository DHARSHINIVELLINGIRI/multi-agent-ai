<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Career Intelligence System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; font-family: 'Inter', sans-serif; }
        .hero { background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); color: white; padding: 60px 0; border-radius: 0 0 50px 50px; margin-bottom: 40px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .card { border: none; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.05); transition: transform 0.3s; }
        .card:hover { transform: translateY(-5px); }
        .btn-primary { background: #4facfe; border: none; padding: 12px 30px; border-radius: 12px; font-weight: 600; }
        .result-card { border-left: 6px solid #4facfe; background: white; margin-bottom: 20px; padding: 20px; border-radius: 15px; }
        .spinner-border { width: 3rem; height: 3rem; }
    </style>
</head>
<body>

<div class="hero text-center">
    <h1 class="display-4 fw-bold">🎓 Academic & Career Intelligence</h1>
    <p class="lead">Multi-Agent AI Analysis System</p>
</div>

<div class="container">
    <div class="row g-4">
        <!-- Input Section -->
        <div class="col-lg-5">
            <div class="card p-4">
                <h4 class="mb-4">Student Profile</h4>
                <div class="mb-3"><label class="form-label">Name</label><input type="text" id="name" class="form-control" placeholder="Dharshini"></div>
                <div class="mb-3"><label class="form-label">GPA</label><input type="number" id="gpa" class="form-control" placeholder="3.85"></div>
                <div class="mb-3"><label class="form-label">Skills</label><input type="text" id="skills" class="form-control" placeholder="Python, Docker, AWS"></div>
                <div class="mb-3"><label class="form-label">Interests</label><input type="text" id="interests" class="form-control" placeholder="Cloud Engineering, AI"></div>
                <div class="mb-3"><label class="form-label">Experience Summary</label><textarea id="resume" class="form-control" rows="4"></textarea></div>
                <button onclick="analyze()" id="mainBtn" class="btn btn-primary w-100">Run Multi-Agent Analysis</button>
            </div>
        </div>

        <!-- Output Section -->
        <div class="col-lg-7">
            <div id="loading" class="text-center d-none"><div class="spinner-border text-primary" role="status"></div><p class="mt-3">Orchestrating AI Agents...</p></div>
            <div id="results" class="d-none">
                <h4 class="mb-4">Orchestrator Insights</h4>
                <div id="content"></div>
            </div>
            <div id="placeholder" class="text-center text-muted mt-5"><h5>Enter details and run analysis to see AI insights.</h5></div>
        </div>
    </div>
</div>

<script>
    async function analyze() {
        const btn = document.getElementById('mainBtn');
        const loader = document.getElementById('loading');
        const results = document.getElementById('results');
        const content = document.getElementById('content');
        const placeholder = document.getElementById('placeholder');

        btn.disabled = true;
        loader.classList.remove('d-none');
        results.classList.add('d-none');
        placeholder.classList.add('d-none');

        const data = {
            name: document.getElementById('name').value,
            gpa: parseFloat(document.getElementById('gpa').value),
            skills: document.getElementById('skills').value.split(','),
            interests: document.getElementById('interests').value.split(','),
            resume_text: document.getElementById('resume').value
        };

       try {
            const response = await fetch('/analyze', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            });
            const res = await response.json();
           <!-- Optimized by Desigaa --> 
            // This line helps you debug in the F12 console
            console.log("Full Server Response:", res);

            document.getElementById('result-box').classList.remove('d-none');
            
            // If the backend name is slightly different, it will show "N/A" instead of "undefined"
            content.innerHTML = `
                <div class="result-card"><h5>🧠 Academic Agent</h5><p>${res.academic || "N/A"}</p></div>
                <div class="result-card" style="border-color:#00f2fe"><h5>🚀 Career Advice</h5><p>${res.career_advice || "N/A"}</p></div>
                <div class="result-card" style="border-color:#ff9a9e"><h5>🔍 Skill Gap Analysis</h5><p>${res.skill_gap || "N/A"}</p></div>
                <div class="result-card" style="border-color:#a18cd1"><h5>📄 Resume Feedback</h5><p>${res.resume_feedback || "N/A"}</p></div>
            `;
            results.classList.remove('d-none');
        }catch (e) {
            alert("Error connecting to the AI Server.");
        } finally {
            loader.classList.add('d-none');
            btn.disabled = false;
        }
    }
</script>
</body>
</html>
