<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Career Intelligence</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .card { border: none; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .header-bg { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 40px 0; margin-bottom: 30px; border-bottom-left-radius: 50px; border-bottom-right-radius: 50px; }
        .btn-primary { background: #667eea; border: none; padding: 10px 25px; border-radius: 8px; }
        #result-box { display: none; margin-top: 30px; }
        .agent-card { background: white; padding: 15px; border-left: 5px solid #667eea; margin-bottom: 10px; border-radius: 5px; }
    </style>
</head>
<body>

<div class="header-bg text-center">
    <h1>🎓 AI Academic & Career Intelligence</h1>
    <p>Powered by Multi-Agent Orchestration</p>
</div>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card p-4">
                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label">Full Name</label>
                        <input type="text" id="name" class="form-control" placeholder="John Doe">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">GPA</label>
                        <input type="number" step="0.1" id="gpa" class="form-control" placeholder="3.8">
                    </div>
                    <div class="col-12">
                        <label class="form-label">Skills</label>
                        <input type="text" id="skills" class="form-control" placeholder="Python, Java, Docker">
                    </div>
                    <div class="col-12">
                        <label class="form-label">Interests</label>
                        <input type="text" id="interests" class="form-control" placeholder="AI, Cloud, Cyber Security">
                    </div>
                    <div class="col-12">
                        <label class="form-label">Resume / Experience</label>
                        <textarea id="resume" class="form-control" rows="3"></textarea>
                    </div>
                    <div class="col-12 text-center">
                        <button onclick="analyze()" id="btn-text" class="btn btn-primary w-100">Analyze Profile</button>
                    </div>
                </div>
            </div>

            <!-- Result Box -->
            <div id="result-box">
                <h3 class="mb-4">Analysis Results</h3>
                <div id="results-content"></div>
            </div>
        </div>
    </div>
</div>

<script>
    async function analyze() {
        const btn = document.getElementById('btn-text');
        btn.innerText = "Processing...";
        btn.disabled = true;

        const data = {
            name: document.getElementById('name').value,
            gpa: parseFloat(document.getElementById('gpa').value),
            skills: document.getElementById('skills').value.split(','),
            interests: document.getElementById('interests').value.split(','),
            resume_text: document.getElementById('resume').value
        };

        try {
            const response = await fetch('/analyze', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            });
            const result = await response.json();
            
            document.getElementById('result-box').style.display = 'block';
            let html = `
                <div class="agent-card"><strong>Academic:</strong><p>${result.academic}</p></div>
                <div class="agent-card"><strong>Career Advice:</strong><p>${result.career_advice}</p></div>
                <div class="agent-card"><strong>Skill Gap:</strong><p>${result.skill_gap}</p></div>
                <div class="agent-card"><strong>Resume Feedback:</strong><p>${result.resume_feedback}</p></div>
            `;
            document.getElementById('results-content').innerHTML = html;
        } catch (e) {
            alert("Error connecting to server.");
        } finally {
            btn.innerText = "Analyze Profile";
            btn.disabled = false;
        }
    }
</script>
</body>
</html>
